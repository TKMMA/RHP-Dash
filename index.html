<!DOCTYPE html>
<html>
<head>
    <title>GFA Dashboard - RHP</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.0.0"></script>
    <style>
        body { display: flex; height: 100vh; margin: 0; font-family: sans-serif; background: #f8f9fa; }
        #map { flex: 1; position: relative; background: #fdfdfd; }
        #dashboard { width: 550px; padding: 25px; overflow-y: auto; background: white; display: flex; flex-direction: column; border-left: 2px solid #dee2e6; }
        
        /* Centered Compact Header */
        .map-header {
            position: absolute;
            top: 15px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 1000;
            background: rgba(255, 255, 255, 0.9);
            padding: 8px 20px;
            border-radius: 30px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.15);
            pointer-events: auto;
            border: 1px solid rgba(0,0,0,0.1);
            text-align: center;
            white-space: nowrap;
        }
        .header-title { color: #2c3e50; font-size: 1.4rem; font-weight: bold; display: inline-block; }
        .header-subtitle { color: #7f8c8d; font-size: 0.95rem; font-weight: bold; display: inline-block; margin-left: 10px; border-left: 1px solid #ccc; padding-left: 10px; }
        .header-version { color: #95a5a6; margin-top: 2px; font-size: 0.8rem; font-weight: normal; }
        .header-version a { color: #3498db; text-decoration: none; }

        .chart-container { height: 600px; margin-top: 10px; position: relative; }
        .controls { background: #f1f3f5; padding: 15px; border-radius: 8px; margin-bottom: 10px; border-left: 5px solid #3498db; }
        #moku-title { color: #2c3e50; margin: 0; font-size: 1.4rem; }
        #moku-stats { color: #7f8c8d; margin: 5px 0 10px 0; font-weight: normal; line-height: 1.5; font-size: 0.95rem; }
        
        .filter-group { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 10px; padding: 10px; background: #fff; border-radius: 6px; border: 1px solid #ddd; }
        .btn-group { display: flex; background: #ddd; padding: 4px; border-radius: 8px; margin-bottom: 10px; }
        .btn-group button { flex: 1; border: none; padding: 8px; cursor: help; border-radius: 6px; font-weight: bold; }
        .btn-group button.active { background: #3498db; color: white; cursor: default; }
        
        .moku-point-label {
            background: none !important; border: none !important; box-shadow: none !important;
            color: #000; font-weight: bold; font-size: 12px;
            text-shadow: 1px 1px 2px white, -1px -1px 2px white;
        }

        .info.legend { padding: 10px; background: rgba(255,255,255,0.9); box-shadow: 0 0 15px rgba(0,0,0,0.2); border-radius: 5px; line-height: 18px; color: #555; font-size: 0.8rem; }
        .info.legend i { width: 18px; height: 18px; float: left; margin-right: 8px; opacity: 0.8; }
    </style>
</head>
<body>

<div id="map">
    <div class="map-header">
        <span class="header-title">GFA Dashboard</span>
        <span class="header-subtitle">The Reef Habitat Plan</span>
        <div class="header-version">By TK for DAR | <a href="https://docs.google.com/document/d/1yZgAC0Bs_O5a_DOmwVkMjCMVveab1P2VcyMG6-hPV_Q/edit?usp=sharing" target="_blank">RHP links</a> | <a href="https://github.com/TKMMA/RHP-Dash" target="_blank">README & Github Repo | version 3/3/26 |</a></div>
    </div>
</div>

<div id="dashboard">
    <h2 id="moku-title">Statewide Overview</h2>
    <h4 id="moku-stats">Connecting to ArcGIS Services...</h4>
    
    <div class="controls">
        <div class="btn-group">
            <button id="raw-btn" class="active" onclick="setMode('raw')" title="RAW MODE: Displays absolute response counts as a heatmap. Darker blue indicates higher community engagement.">Raw Counts</button>
            <button id="norm-btn" onclick="setMode('norm')" title="OUTLIER MODE: Normalizes data by population. Red highlights where community interest stands out relative to the number of residents.">Outlier Mode</button>
        </div>
        <div id="filter-container" class="filter-group"></div>
    </div>

    <div class="chart-container"><canvas id="mainChart"></canvas></div>
</div>

<script>
    Chart.register(ChartDataLabels);
    const map = L.map('map').setView([20.4, -157.4], 7);
    
    // Switch to CartoDB Positron for a cleaner, non-distracting look
    L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
        attribution: '&copy; CartoDB'
    }).addTo(map);

    let chart, surveyData = [], mokuFeatures = [], selectedMoku = null, geojsonLayer = null, currentMode = 'raw', legend = null;
    let labelLayers = L.layerGroup().addTo(map);

    const surveyUrl = "https://services.arcgis.com/HQ0xoN0EzDPBOEci/ArcGIS/rest/services/RHP_SURVEY_-_View_layer_-_no_emails/FeatureServer/0/query?where=1%3D1&outFields=*&f=pjson";
    const mokuUrl = "https://services.arcgis.com/HQ0xoN0EzDPBOEci/ArcGIS/rest/services/Moku%20with%20population%20and%20point%20count/FeatureServer/0/query?where=1%3D1&outFields=*&f=geojson";

    const categories = [
        { key: 'Artificialreefs', label: 'Art. Reefs' },
        { key: 'Outplanting', label: 'Outplanting' },
        { key: 'limuremoval', label: 'Limu Removal' },
        { key: 'Stocking', label: 'Fish Stocking' },
        { key: 'Invasivecontrol', label: 'Invasive Ctrl' },
        { key: 'freshwaterfixes', label: 'Freshwater Fix' }
    ];

    categories.forEach(cat => {
        const div = document.createElement('div');
        div.innerHTML = `<label><input type="checkbox" checked value="${cat.key}" onchange="updateDashboard()"> ${cat.label}</label>`;
        document.getElementById('filter-container').appendChild(div);
    });

    function setMode(mode) {
        currentMode = mode;
        document.getElementById('raw-btn').className = mode === 'raw' ? 'active' : '';
        document.getElementById('norm-btn').className = mode === 'norm' ? 'active' : '';
        updateDashboard();
    }

    // Color Ramps
    function getOutlierColor(d) {
        return d > 2.0 ? '#800026' : d > 1.5 ? '#BD0026' : d > 1.1 ? '#E31A1C' : d > 0.8 ? '#FC4E2A' : '#FED976';
    }
    function getRawColor(d) {
        return d > 100 ? '#084594' : d > 50 ? '#2171b5' : d > 20 ? '#4292c6' : d > 5 ? '#9ecae1' : '#eff3ff';
    }

    function updateDashboard() {
        if (!surveyData.length || !mokuFeatures.length) return;

        const isNorm = (currentMode === 'norm');
        const activeKeys = Array.from(document.querySelectorAll('#filter-container input:checked')).map(i => i.value);
        const data = selectedMoku ? surveyData.filter(d => d.attributes.MOKUSELECTED_where_do_you_restr === selectedMoku.properties.MO_IS) : surveyData;
        const statePop = mokuFeatures.reduce((acc, curr) => acc + (curr.properties.sum_TOTPOP_CY || 0), 0);
        const totalSurveyCount = surveyData.length;
        const localPop = selectedMoku ? (selectedMoku.properties.sum_TOTPOP_CY || 1) : statePop;

        const mName = selectedMoku ? selectedMoku.properties.MO_IS : "Statewide Overview";
        const resPerCapita = data.length > 0 ? Math.round(localPop / data.length) : 0;
        
        let repText = selectedMoku ? `<br><b>${(((data.length / totalSurveyCount)*100) - ((localPop / statePop)*100)).toFixed(2)}% Representation Gap</b>` : `<br><b>Baseline: 100% of State Population</b>`;
        document.getElementById('moku-title').innerText = mName;
        document.getElementById('moku-stats').innerHTML = `${data.length.toLocaleString()} Responses | Pop: ${localPop.toLocaleString()}<br>1 Response per ${resPerCapita.toLocaleString()} People${repText}`;

        // Chart Logic
        const scalar = isNorm ? (1000 / localPop) : 1;
        const chartLabels = categories.filter(c => activeKeys.includes(c.key));
        const mostData = [], somewhatData = [], hardlyData = [];

        chartLabels.forEach(cat => {
            const m = data.filter(d => d.attributes[cat.key] === 'Most effective').length * scalar;
            const s = data.filter(d => d.attributes[cat.key] === 'Somewhat effective').length * scalar;
            const h = data.filter(d => d.attributes[cat.key] === 'Hardly effective').length * scalar;
            const sOffset = isNorm ? -(s / 2) : h;
            hardlyData.push(isNorm ? [sOffset - h, sOffset] : [0, h]);
            somewhatData.push([sOffset, sOffset + s]);
            mostData.push([sOffset + s, sOffset + s + m]);
        });

        if (chart) chart.destroy();
        chart = new Chart(document.getElementById('mainChart'), {
            type: 'bar',
            data: {
                labels: chartLabels.map(c => c.label),
                datasets: [
                    { label: 'Hardly Effective', data: hardlyData, backgroundColor: '#e74c3c' },
                    { label: 'Somewhat Effective', data: somewhatData, backgroundColor: '#f1c40f' },
                    { label: 'Most Effective', data: mostData, backgroundColor: '#2ecc71' }
                ]
            },
            options: {
                maintainAspectRatio: false,
                scales: { y: { beginAtZero: !isNorm, grid: { color: (c) => c.tick.value === 0 ? '#000' : '#ddd', lineWidth: (c) => c.tick.value === 0 ? 3 : 1 } } },
                plugins: { datalabels: { color: '#000', font: { weight: 'bold', size: 10 }, formatter: (v) => Math.abs(v[1]-v[0]) > (isNorm?0.05:2) ? Math.abs(v[1]-v[0]).toFixed(isNorm?2:0) : '' }, legend: { position: 'bottom' } }
            }
        });

        // Legend & Map Styling
        if (legend) map.removeControl(legend);
        legend = L.control({position: 'bottomleft'});
        legend.onAdd = function () {
            const div = L.DomUtil.create('div', 'info legend');
            div.innerHTML = `<strong>${isNorm ? 'Interest Intensity' : 'Total Responses'}</strong><br>`;
            const grades = isNorm ? [0, 0.8, 1.1, 1.5, 2.0] : [0, 5, 20, 50, 100];
            const labels = isNorm ? ['Low', 'Average', 'Above Avg', 'High', 'Significant'] : ['0-5', '6-20', '21-50', '51-100', '100+'];
            for (let i = 0; i < grades.length; i++) {
                div.innerHTML += `<i style="background:${isNorm ? getOutlierColor(grades[i]+0.1) : getRawColor(grades[i]+1)}"></i> ${labels[i]}<br>`;
            }
            return div;
        };
        legend.addTo(map);

        geojsonLayer.eachLayer(layer => {
            const mName = layer.feature.properties.MO_IS;
            const mRes = surveyData.filter(d => d.attributes.MOKUSELECTED_where_do_you_restr === mName);
            let score = 0; activeKeys.forEach(k => score += mRes.filter(d => d.attributes[k] === 'Most effective').length);
            const intensity = (score / layer.feature.properties.sum_TOTPOP_CY) / (totalSurveyCount / statePop);
            layer.setStyle({
                fillColor: isNorm ? getOutlierColor(intensity) : getRawColor(mRes.length),
                fillOpacity: 0.8,
                weight: selectedMoku && selectedMoku.properties.MO_IS === mName ? 4 : 1,
                color: selectedMoku && selectedMoku.properties.MO_IS === mName ? '#000' : '#2c3e50'
            });
        });
    }

    map.on('zoomend', () => { if (map.getZoom() < 7) { map.removeLayer(labelLayers); } else { map.addLayer(labelLayers); } });
    map.on('click', (e) => { if (e.originalEvent.target.id === 'map') { selectedMoku = null; updateDashboard(); } });

    Promise.all([fetch(surveyUrl).then(r => r.json()), fetch(mokuUrl).then(r => r.json())])
        .then(([sJson, mGeoJson]) => {
            surveyData = sJson.features; mokuFeatures = mGeoJson.features;
            geojsonLayer = L.geoJSON(mGeoJson, {
                onEachFeature: (feature, layer) => {
                    const name = feature.properties.MO_IS;
                    const count = surveyData.filter(d => d.attributes.MOKUSELECTED_where_do_you_restr === name).length;
                    L.marker(layer.getBounds().getCenter(), { icon: L.divIcon({ className: 'moku-point-label', html: count > 0 ? count : '', iconSize: [30, 20] }), interactive: false }).addTo(labelLayers);
                    layer.bindTooltip(`<b>${name}</b>`, { sticky: true }).on('click', (e) => { L.DomEvent.stopPropagation(e); selectedMoku = feature; updateDashboard(); });
                }
            }).addTo(map);
            updateDashboard();
        });
</script>
</body>
</html>

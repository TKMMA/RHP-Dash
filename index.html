<!DOCTYPE html>
<html>
<head>
    <title>RHP Dynamic Dashboard</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { display: flex; height: 100vh; margin: 0; font-family: sans-serif; background: #f8f9fa; }
        #map { flex: 1; border-right: 2px solid #dee2e6; }
        #dashboard { width: 500px; padding: 25px; overflow-y: auto; background: white; display: flex; flex-direction: column; }
        .chart-container { height: 400px; margin-top: 20px; }
        .controls { background: #e9ecef; padding: 15px; border-radius: 8px; margin-bottom: 10px; }
        h2 { color: #2c3e50; margin-top: 0; border-bottom: 2px solid #eee; padding-bottom: 10px; }
        .moku-label { background: white; border: 1px solid #999; padding: 2px 5px; border-radius: 4px; font-weight: bold; }
        .switch { position: relative; display: inline-block; width: 50px; height: 24px; vertical-align: middle; margin-right: 10px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #ccc; transition: .4s; border-radius: 24px; }
        .slider:before { position: absolute; content: ""; height: 16px; width: 16px; left: 4px; bottom: 4px; background-color: white; transition: .4s; border-radius: 50%; }
        input:checked + .slider { background-color: #3498db; }
        input:checked + .slider:before { transform: translateX(26px); }
    </style>
</head>
<body>

<div id="map"></div>
<div id="dashboard">
    <h2 id="moku-title">Statewide Overview</h2>
    
    <div class="controls">
        <label class="switch">
            <input type="checkbox" id="norm-toggle">
            <span class="slider"></span>
        </label>
        <strong>Normalize by Population</strong>
        <p style="font-size: 0.8rem; margin: 5px 0 0 0;">Toggle to see responses per 1,000 residents.</p>
    </div>

    <div class="chart-container"><canvas id="mainChart"></canvas></div>
    <p style="font-size: 0.9rem; color: #666; margin-top: 20px;">
        Click a Moku on the map to filter. Bars show raw response counts unless normalization is toggled on.
    </p>
</div>

<script>
    const map = L.map('map').setView([20.4, -157.4], 7);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

    let chart, surveyData = [], mokuFeatures = [], selectedMoku = null, selectedLayer = null;

    const surveyUrl = "https://services.arcgis.com/HQ0xoN0EzDPBOEci/ArcGIS/rest/services/RHP_SURVEY_-_View_layer_-_no_emails/FeatureServer/0/query?where=1%3D1&outFields=*&f=json";
    const mokuUrl = "https://services.arcgis.com/HQ0xoN0EzDPBOEci/ArcGIS/rest/services/Moku%20with%20population%20and%20point%20count/FeatureServer/0/query?where=1%3D1&outFields=*&f=geojson";

    const categories = [
        { key: 'Artificialreefs', label: 'Art. Reefs' },
        { key: 'Outplanting', label: 'Outplanting' },
        { key: 'limuremoval', label: 'Limu Removal' },
        { key: 'Stocking', label: 'Fish Stocking' },
        { key: 'Invasivecontrol', label: 'Invasive Ctrl' },
        { key: 'freshwaterfixes', label: 'Freshwater Fix' }
    ];

    function updateChart() {
        const isNormalized = document.getElementById('norm-toggle').checked;
        const dataToProcess = selectedMoku ? surveyData.filter(d => d.attributes.MOKUSELECTED_where_do_you_restr === selectedMoku.properties.MO_IS) : surveyData;
        const title = selectedMoku ? selectedMoku.properties.MO_IS : "Statewide Overview";
        
        // Find population (Sum of all mokus if statewide)
        let pop = 1450000; // default state approx
        if (selectedMoku) {
            pop = selectedMoku.properties.sum_TOTPOP_CY || 1;
        } else {
            pop = mokuFeatures.reduce((acc, curr) => acc + (curr.properties.sum_TOTPOP_CY || 0), 0);
        }

        const scalar = isNormalized ? (1000 / pop) : 1;
        const yAxisLabel = isNormalized ? "Responses per 1,000 Residents" : "Number of Responses";

        document.getElementById('moku-title').innerText = `${title} (${dataToProcess.length} Responses)`;

        const counts = categories.map(cat => ({
            most: (dataToProcess.filter(d => d.attributes[cat.key] === 'Most effective').length * scalar).toFixed(2),
            some: (dataToProcess.filter(d => d.attributes[cat.key] === 'Somewhat effective').length * scalar).toFixed(2),
            hardly: (dataToProcess.filter(d => d.attributes[cat.key] === 'Hardly effective').length * scalar).toFixed(2)
        }));

        const ctx = document.getElementById('mainChart').getContext('2d');
        if (chart) chart.destroy();

        chart = new Chart(ctx, {
            type: 'bar',
            data: {
                labels: categories.map(c => c.label),
                datasets: [
                    { label: 'Most Effective', data: counts.map(c => c.most), backgroundColor: '#2ecc71' },
                    { label: 'Somewhat Effective', data: counts.map(c => c.some), backgroundColor: '#f1c40f' },
                    { label: 'Hardly Effective', data: counts.map(c => c.hardly), backgroundColor: '#e74c3c' }
                ]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                scales: { 
                    x: { stacked: true }, 
                    y: { stacked: true, beginAtZero: true, title: { display: true, text: yAxisLabel } } 
                },
                plugins: { legend: { position: 'bottom' } }
            }
        });
    }

    document.getElementById('norm-toggle').addEventListener('change', updateChart);

    Promise.all([fetch(surveyUrl).then(r => r.json()), fetch(mokuUrl).then(r => r.json())])
        .then(([sJson, mGeoJson]) => {
            surveyData = sJson.features;
            mokuFeatures = mGeoJson.features;
            
            const geojson = L.geoJSON(mGeoJson, {
                style: { color: '#2c3e50', weight: 1, fillOpacity: 0.1 },
                onEachFeature: (feature, layer) => {
                    const name = feature.properties.MO_IS;
                    const count = surveyData.filter(d => d.attributes.MOKUSELECTED_where_do_you_restr === name).length;
                    layer.bindTooltip(`<b>${name}</b><br>${count} Responses`, { direction: "center", className: "moku-label" });

                    layer.on('click', () => {
                        if (selectedLayer) geojson.resetStyle(selectedLayer);
                        selectedLayer = layer;
                        selectedMoku = feature;
                        layer.setStyle({ color: '#000', weight: 4, fillOpacity: 0.3 });
                        updateChart();
                        map.fitBounds(layer.getBounds());
                    });
                }
            }).addTo(map);

            updateChart();
        });
</script>
</body>
</html>

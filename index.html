<!DOCTYPE html>
<html>
<head>
    <title>RHP Dynamic Dashboard</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { display: flex; height: 100vh; margin: 0; font-family: sans-serif; background: #f8f9fa; }
        #map { flex: 1; border-right: 2px solid #dee2e6; }
        #dashboard { width: 500px; padding: 25px; overflow-y: auto; background: white; display: flex; flex-direction: column; }
        .chart-container { height: 450px; margin-top: 20px; }
        .controls { background: #f1f3f5; padding: 15px; border-radius: 8px; border-left: 5px solid #3498db; }
        h2 { color: #2c3e50; margin: 0; border-bottom: 2px solid #eee; padding-bottom: 10px; }
        /* Toggle Switch Styling */
        .switch { position: relative; display: inline-block; width: 40px; height: 20px; margin-right: 10px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #ccc; transition: .4s; border-radius: 20px; }
        .slider:before { position: absolute; content: ""; height: 14px; width: 14px; left: 3px; bottom: 3px; background-color: white; transition: .4s; border-radius: 50%; }
        input:checked + .slider { background-color: #3498db; }
        input:checked + .slider:before { transform: translateX(20px); }
    </style>
</head>
<body>

<div id="map"></div>
<div id="dashboard">
    <h2 id="moku-title">Statewide Overview</h2>
    
    <div class="controls">
        <label class="switch">
            <input type="checkbox" id="norm-toggle">
            <span class="slider"></span>
        </label>
        <strong>Identify Regional Outliers</strong>
        <p style="font-size: 0.8rem; margin: 5px 0 0 0; color: #555;">
            Normalizes by population to show where interest is higher than the state average (Index 1.0).
        </p>
    </div>

    <div class="chart-container"><canvas id="mainChart"></canvas></div>
</div>

<script>
    const map = L.map('map').setView([20.4, -157.4], 7);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

    let chart, surveyData = [], mokuFeatures = [], selectedMoku = null, selectedLayer = null;
    const surveyUrl = "https://services.arcgis.com/HQ0xoN0EzDPBOEci/ArcGIS/rest/services/RHP_SURVEY_-_View_layer_-_no_emails/FeatureServer/0/query?where=1%3D1&outFields=*&f=json";
    const mokuUrl = "https://services.arcgis.com/HQ0xoN0EzDPBOEci/ArcGIS/rest/services/Moku%20with%20population%20and%20point%20count/FeatureServer/0/query?where=1%3D1&outFields=*&f=geojson";

    const categories = [
        { key: 'Artificialreefs', label: 'Art. Reefs' },
        { key: 'Outplanting', label: 'Outplanting' },
        { key: 'limuremoval', label: 'Limu Removal' },
        { key: 'Stocking', label: 'Fish Stocking' },
        { key: 'Invasivecontrol', label: 'Invasive Ctrl' },
        { key: 'freshwaterfixes', label: 'Freshwater Fix' }
    ];

    function updateChart() {
        const isNormalized = document.getElementById('norm-toggle').checked;
        const currentMokuData = selectedMoku ? surveyData.filter(d => d.attributes.MOKUSELECTED_where_do_you_restr === selectedMoku.properties.MO_IS) : surveyData;
        
        // 1. Get Populations
        const statePop = mokuFeatures.reduce((acc, curr) => acc + (curr.properties.sum_TOTPOP_CY || 0), 0);
        const localPop = selectedMoku ? (selectedMoku.properties.sum_TOTPOP_CY || 1) : statePop;

        const yAxisTitle = isNormalized ? "Impact Index (1.0 = State Avg)" : "Raw Response Count";

        // 2. Calculate Outlier Indices
        const dataSets = categories.map(cat => {
            const stateMost = surveyData.filter(d => d.attributes[cat.key] === 'Most effective').length;
            const stateRate = stateMost / statePop; // Baseline interest rate

            const localMost = currentMokuData.filter(d => d.attributes[cat.key] === 'Most effective').length;
            const localRate = localMost / localPop;

            // If normalized, show the ratio. If not, show raw count.
            const value = isNormalized ? (localRate / stateRate).toFixed(2) : localMost;
            
            return {
                val: parseFloat(value),
                // Highlight if significantly higher than average (e.g., 20% higher)
                color: (isNormalized && value > 1.2) ? '#f1c40f' : '#2ecc71' 
            };
        });

        const ctx = document.getElementById('mainChart').getContext('2d');
        if (chart) chart.destroy();

        chart = new Chart(ctx, {
            type: 'bar',
            data: {
                labels: categories.map(c => c.label),
                datasets: [{
                    label: isNormalized ? 'Regional Preference Intensity' : 'Most Effective Counts',
                    data: dataSets.map(d => d.val),
                    backgroundColor: dataSets.map(d => d.color),
                    borderWidth: 1,
                    borderColor: '#27ae60'
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                scales: { 
                    y: { 
                        beginAtZero: true, 
                        title: { display: true, text: yAxisTitle },
                        // Draw a line at 1.0 to show the state average
                        grid: { color: (context) => context.tick.value === 1 && isNormalized ? '#e74c3c' : '#ddd' }
                    } 
                }
            }
        });
    }

    document.getElementById('norm-toggle').addEventListener('change', updateChart);

    Promise.all([fetch(surveyUrl).then(r => r.json()), fetch(mokuUrl).then(r => r.json())])
        .then(([sJson, mGeoJson]) => {
            surveyData = sJson.features;
            mokuFeatures = mGeoJson.features;
            
            L.geoJSON(mGeoJson, {
                style: { color: '#2c3e50', weight: 1, fillOpacity: 0.1 },
                onEachFeature: (feature, layer) => {
                    layer.on('click', () => {
                        if (selectedLayer) layer.options.color = '#2c3e50'; 
                        selectedLayer = layer;
                        selectedMoku = feature;
                        layer.setStyle({ color: '#000', weight: 4 });
                        updateChart();
                    });
                }
            }).addTo(map);
            updateChart();
        });
</script>
</body>
</html>

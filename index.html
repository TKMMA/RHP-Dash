<!DOCTYPE html>
<html>
<head>
    <title>RHP Survey Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: 'Helvetica Neue', sans-serif; padding: 40px; background: #f0f2f5; }
        .container { max-width: 900px; margin: auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
        h1 { color: #1a202c; border-bottom: 2px solid #e2e8f0; padding-bottom: 10px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>How can we improve nearshore fish habitat?</h1>
        <canvas id="mainChart" height="400"></canvas>
    </div>

    <script>
        async function buildDashboard() {
            const response = await fetch('survey_data.json');
            const raw = await response.json();
            
            const labels = raw.categories.map(c => c.label);
            const most = raw.categories.map(c => c.most);
            const some = raw.categories.map(c => c.somewhat);
            const hardly = raw.categories.map(c => c.hardly);

            new Chart(document.getElementById('mainChart'), {
                type: 'bar',
                data: {
                    labels: labels,
                    datasets: [
                        { label: 'Most Effective', data: most, backgroundColor: '#2ecc71' },
                        { label: 'Somewhat Effective', data: some, backgroundColor: '#f1c40f' },
                        { label: 'Hardly Effective', data: hardly, backgroundColor: '#e74c3c' }
                    ]
                },
                options: {
                    indexAxis: 'y',
                    scales: { x: { stacked: true }, y: { stacked: true } },
                    plugins: { 
                        legend: { position: 'bottom' },
                        tooltip: { mode: 'index', intersect: false }
                    }
                }
            });
        }
        buildDashboard();
    </script>
</body>
</html>

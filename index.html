<!DOCTYPE html>
<html>
<head>
    <title>RHP Dynamic Dashboard</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { display: flex; height: 100vh; margin: 0; font-family: -apple-system, sans-serif; background: #f4f7f6; }
        #map { flex: 1; border-right: 2px solid #ddd; }
        #dashboard { width: 500px; padding: 25px; overflow-y: auto; background: white; display: flex; flex-direction: column; }
        .chart-container { flex-grow: 1; min-height: 450px; margin-top: 20px; }
        h2 { color: #2c3e50; margin: 0 0 10px 0; font-size: 1.5rem; border-bottom: 2px solid #eee; padding-bottom: 10px; }
        .info-text { font-size: 0.9rem; color: #666; margin-top: 10px; line-height: 1.4; }
        .moku-label { background: white; border: 1px solid #999; padding: 2px 5px; border-radius: 4px; font-weight: bold; }
    </style>
</head>
<body>

<div id="map"></div>
<div id="dashboard">
    <h2 id="moku-title">Statewide Overview</h2>
    <div id="data-warning" style="display:none; color: #d35400; font-weight: bold; margin-bottom: 10px;">
        ⚠️ Limited data for this selection. Results may not be representative.
    </div>
    <div class="chart-container"><canvas id="mainChart"></canvas></div>
    <p class="info-text"><b>Map UX:</b> Click a Moku to highlight the region and filter restoration preferences. Labels show total survey responses per area.</p>
</div>

<script>
    const map = L.map('map').setView([20.4, -157.4], 7);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

    let chart;
    let surveyData = [];
    let selectedLayer = null;
    
    // API Endpoints from your ArcGIS Services
    const surveyUrl = "https://services.arcgis.com/HQ0xoN0EzDPBOEci/ArcGIS/rest/services/RHP_SURVEY_-_View_layer_-_no_emails/FeatureServer/0/query?where=1%3D1&outFields=*&f=json";
    const mokuUrl = "https://services.arcgis.com/HQ0xoN0EzDPBOEci/ArcGIS/rest/services/Moku%20with%20population%20and%20point%20count/FeatureServer/0/query?where=1%3D1&outFields=*&f=geojson";

    const categories = [
        { key: 'Artificialreefs', label: 'Art. Reefs' },
        { key: 'Outplanting', label: 'Outplanting' },
        { key: 'limuremoval', label: 'Limu Removal' },
        { key: 'Stocking', label: 'Fish Stocking' },
        { key: 'Invasivecontrol', label: 'Invasive Ctrl' },
        { key: 'freshwaterfixes', label: 'Freshwater Fix' }
    ];

    function updateChart(filteredData, title) {
        const totalCount = filteredData.length;
        document.getElementById('moku-title').innerText = `${title} (${totalCount} Responses)`;
        document.getElementById('data-warning').style.display = (totalCount > 0 && totalCount < 10) ? 'block' : 'none';

        // Calculate Percentages for the 100% Stacked Bar
        const datasets = { most: [], some: [], hardly: [] };

        categories.forEach(cat => {
            const catData = filteredData.map(d => d.attributes[cat.key]);
            const totalValid = catData.filter(v => v).length || 1; // Avoid divide by zero

            datasets.most.push(((catData.filter(v => v === 'Most effective').length / totalValid) * 100).toFixed(1));
            datasets.some.push(((catData.filter(v => v === 'Somewhat effective').length / totalValid) * 100).toFixed(1));
            datasets.hardly.push(((catData.filter(v => v === 'Hardly effective').length / totalValid) * 100).toFixed(1));
        });

        const ctx = document.getElementById('mainChart').getContext('2d');
        if (chart) chart.destroy();

        chart = new Chart(ctx, {
            type: 'bar',
            data: {
                labels: categories.map(c => c.label),
                datasets: [
                    { label: 'Most Effective', data: datasets.most, backgroundColor: '#2ecc71' },
                    { label: 'Somewhat Effective', data: datasets.some, backgroundColor: '#f1c40f' },
                    { label: 'Hardly Effective', data: datasets.hardly, backgroundColor: '#e74c3c' }
                ]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                scales: { 
                    x: { stacked: true }, 
                    y: { 
                        stacked: true, 
                        beginAtZero: true, 
                        max: 100,
                        title: { display: true, text: 'Percentage of Responses (%)' }
                    } 
                },
                plugins: { 
                    legend: { position: 'bottom' },
                    tooltip: { callbacks: { label: (ctx) => `${ctx.dataset.label}: ${ctx.raw}%` } }
                }
            }
        });
    }

    // Initialize Dashboard
    Promise.all([fetch(surveyUrl).then(r => r.json()), fetch(mokuUrl).then(r => r.json())])
        .then(([sJson, mGeoJson]) => {
            surveyData = sJson.features;
            
            const mokuLayer = L.geoJSON(mGeoJson, {
                style: { color: '#34495e', weight: 1, fillOpacity: 0.2 },
                onEachFeature: (feature, layer) => {
                    const name = feature.properties.MO_IS;
                    const count = surveyData.filter(d => d.attributes.MOKUSELECTED_where_do_you_restr === name).length;

                    // TOOLTIP: Shows count of responses per moku
                    layer.bindTooltip(`<b>${name}</b><br>${count} Responses`, { direction: 'center', className: 'moku-label' });

                    layer.on('click', (e) => {
                        // HIGHLIGHT: Reset others, bold the selection
                        if (selectedLayer) mokuLayer.resetStyle(selectedLayer);
                        selectedLayer = layer;
                        layer.setStyle({ color: '#000', weight: 4, fillOpacity: 0.4 });
                        
                        const filtered = surveyData.filter(d => d.attributes.MOKUSELECTED_where_do_you_restr === name);
                        updateChart(filtered, name);
                        map.fitBounds(layer.getBounds(), { padding: [20, 20] });
                    });
                }
            }).addTo(map);

            updateChart(surveyData, "Statewide Overview");
        });
</script>
</body>
</html>
